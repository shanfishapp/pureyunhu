syntax = "proto3";

package io.github.shanfishapp.pureyunhu;

option java_package = "io.github.shanfishapp.pureyunhu.protobuf";
option java_multiple_files = true;

message User {
  int32 id = 1;
  string name = 2;
  string email = 3;
  int32 age = 4;
}

message UserList {
  repeated User users = 1;
}